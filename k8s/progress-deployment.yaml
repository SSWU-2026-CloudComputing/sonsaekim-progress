apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonsaekim-progress
  labels:
    app: sonsaekim-progress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonsaekim-progress
  template:
    metadata:
      labels:
        app: sonsaekim-progress
    spec:
      containers:
        - name: sonsaekim-progress
          image: mminnn28/sswu_sonsaekim-progress:__VERSION__
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: progress-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: progress-secret
                  key: DB_PASSWORD
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: progress-secret
                  key: RABBITMQ_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: progress-service
  annotations:
    cloud.google.com/backend-config: '{"default": "progress-backend-config"}'
spec:
  selector:
    app: sonsaekim-progress
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3002
  type: ClusterIP
